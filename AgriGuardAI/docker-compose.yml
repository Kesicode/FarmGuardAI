version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: agriguard_db
    environment:
      POSTGRES_USER: agriguard
      POSTGRES_PASSWORD: agriguard_secret
      POSTGRES_DB: agriguard
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agriguard -d agriguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agriguard_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: agriguard_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://agriguard:agriguard_secret@db:5432/agriguard
      - REDIS_URL=redis://redis:6379/0

volumes:
  pg_data:
  redis_data:
